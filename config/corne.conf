# USB output (required explicitly for split keyboards)
CONFIG_ZMK_USB=y

# Enable ZMK Studio (no locking so we can always connect)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Pointing device support
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# I2C for touchpad
CONFIG_I2C=y
CONFIG_I2C_LOG_LEVEL_DBG=y
CONFIG_INPUT_LOG_LEVEL_DBG=y

# NOTE: do NOT set CONFIG_LOG_MODE_IMMEDIATE=y alongside CONFIG_ZMK_USB_LOGGING.
# USB CDC doesn't enumerate for ~1s after boot; immediate-mode logs before that
# are dropped. Deferred mode (USB_LOGGING's default) buffers them and flushes
# once USB is live, so we actually see iqs5xx init messages.
CONFIG_LOG_BUFFER_SIZE=16384

# Increase BT transmit power for better split connectivity
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Sleep / power / battery ---
# Deep sleep at 15min idle. Drops the MCU to ~20uA vs ~1.5mA awake-idle.
# Single highest-impact battery config on wireless ZMK.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Slow battery ADC poll from default 60s to 120s. Reduces ADC wakeups +
# keeps BAS notifications (which ZMK only fires on percentage change anyway)
# rare enough to be invisible.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=120
