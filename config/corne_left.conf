# Left half (central) — central-only Kconfig.

# Fetch right-half battery level over BLE split so we get peripheral battery
# reports in the ZMK event bus (visible via RTT / USB logging if enabled).
# macOS won't display it natively; use a BLE scanner or tray tool if desired.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
