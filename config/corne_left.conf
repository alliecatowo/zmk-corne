# Left half (central) — central-only Kconfig.

# Upstream corne shield's Kconfig.defconfig sets CONFIG_ZMK_KEYBOARD_NAME
# default "Corne" for the left half. Setting it explicitly here (in the
# per-half conf loaded alongside the shield) overrides that default.
CONFIG_ZMK_KEYBOARD_NAME="LilAllieCat"

# BT advertising name is a separate Zephyr-level Kconfig (ZMK Studio reads
# ZMK_KEYBOARD_NAME, host BT stack reads BT_DEVICE_NAME). Set both so the
# macOS Bluetooth panel reflects the correct name. NOTE: macOS caches
# paired device names — you may need to forget the pairing in System
# Settings and re-pair after flashing to see the new name.
CONFIG_BT_DEVICE_NAME="LilAllieCat"
