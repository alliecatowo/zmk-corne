# Left half (central) — central-only Kconfig.

# ZMK_KEYBOARD_NAME: shows in ZMK Studio + default fallback for BT name
# when NVS is empty. Upstream Corne shield defaults this to "Corne";
# setting it here overrides.
CONFIG_ZMK_KEYBOARD_NAME="Lil Allie Cat"

# BT advertising name: the label shown in the macOS Bluetooth panel.
# NOTE: NVS persists this after first boot. If it keeps showing an old
# name, flash settings_reset.uf2 to wipe the persisted name, then
# reflash this firmware so NVS repopulates from Kconfig.
CONFIG_BT_DEVICE_NAME="Lil Allie Cat"

# BT Device Information Service "Model Number" characteristic — shown in
# BT device details. Independent of device name. Not NVS-cached, so
# changes stick on every flash.
CONFIG_BT_DIS_MODEL="AllieCatKeeb42069"
