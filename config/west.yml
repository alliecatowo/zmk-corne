manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: AYM1607
      url-base: https://github.com/AYM1607
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    # AYM1607 works on this hardware (first tested flash moved cursor).
    # stelmakhdigital was tested in the same session and did not produce
    # cursor events — reverted. Migration attempt is preserved in git
    # history for a future retry with more careful debug.
    - name: zmk-driver-azoteq-iqs5xx
      remote: AYM1607
      revision: main
  self:
    path: config
